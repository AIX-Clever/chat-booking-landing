name: Deploy Landing Page

on:
  push:
    branches:
      - dev
      - qa
      - stg
      - prod
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENV: dev # Always deploy to dev environment in current AWS account
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install and Build App
        run: |
          npm ci
          # Replace reCAPTCHA Placeholder
          sed -i "s/__RECAPTCHA_SITE_KEY__/${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}/g" index.html
          sed -i "s/__RECAPTCHA_SITE_KEY__/${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}/g" privacy.html
          sed -i "s/__RECAPTCHA_SITE_KEY__/${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}/g" terms.html
          # If there is a build script, run it. For static HTML/CSS, sometimes it's just copying or no-op.
          # Checking if 'build' script exists, otherwise skip (safely)
          if npm run | grep -q "^ *build *"; then npm run build; fi
        env:
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install CDK dependencies
        run: |
          cd infra
          npm ci

      - name: Deploy with CDK
        run: |
          cd infra
          # Map branch to environment variables
          if [ "${{ github.ref_name }}" == "main" ] || [ "${{ github.ref_name }}" == "prod" ] || [ "${{ github.ref_name }}" == "dev" ]; then
            export ENV="prod"
            export DOMAIN_NAME="holalucia.cl"
            export CERTIFICATE_ARN="$CERT_PROD"
          else
            export ENV="${{ github.ref_name }}"
            export DOMAIN_NAME="${ENV}.holalucia.cl"
            
            ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')
            var_name="CERT_${ENV_UPPER}"
            export CERTIFICATE_ARN="${!var_name}"
          fi
          
          echo "Deploying to environment: $ENV with domain: $DOMAIN_NAME"
          
          npx cdk bootstrap
          npx cdk deploy --require-approval never
        env:
          DOMAIN_NAME: holalucia.cl
          CERT_DEV: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN_DEV }}
          CERT_QA: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN_QA }}
          CERT_STG: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN_STG }}
          CERT_PROD: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN_PROD }}
