name: Deploy Landing Page

on:
  push:
    branches:
      - dev
      - qa
      - stg
      - prod
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Build App
        run: |
          npm ci
          # Replace reCAPTCHA Placeholder
          sed -i "s/__RECAPTCHA_SITE_KEY__/${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}/g" index.html
          sed -i "s/__RECAPTCHA_SITE_KEY__/${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}/g" privacy.html
          sed -i "s/__RECAPTCHA_SITE_KEY__/${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}/g" terms.html
          if npm run | grep -q "^ *build *"; then npm run build; fi
        env:
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install CDK dependencies
        run: |
          cd infra
          npm ci

      - name: Deploy with CDK
        run: |
          export ENV="${{ github.ref_name }}"
          if [ "$ENV" == "main" ] || [ "$ENV" == "prod" ]; then
            export ENV="prod"
            export DOMAIN_NAME="holalucia.cl"
          elif [ "$ENV" == "qa" ]; then
            export DOMAIN_NAME="qa.holalucia.cl"
          else
            export DOMAIN_NAME="dev.holalucia.cl"
          fi

          echo "Deploying to environment: $ENV with domain: $DOMAIN_NAME"
          cd infra
          npx cdk deploy --all --require-approval never -c env=$ENV
        env:
          ENV: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
          CERTIFICATE_ARN: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN }}
